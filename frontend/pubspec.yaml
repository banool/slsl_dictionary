name: slsl_dictionary
description: Free video dictionary for Sri Lankan Sign Language

publish_to: 'none'

version: 1.3.22+176

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  cached_network_image: ^3.2.3
  carousel_slider:
  dictionarylib:
    # path: ../../dictionarylib
    git:
      url: https://github.com/banool/dictionarylib.git
      ref: a72c134e66324b4120fba2a4f4459dbaeb2bf13b
  dolphinsr_dart:
    git:
      url: https://github.com/banool/dolphhinsr_dart.git
      # Pinned to the same commit dictionarylib uses so the two git refs don't
      # conflict during resolution (dictionarylib pins this SHA, not master).
      ref: 33ae39bf066ddb7e1169c97f56f5c9f2930a2f0b
  dots_indicator:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_native_splash:
  go_router:
  http:
  intl:
  json_annotation: ^4.8.1
  json_serializable: ^6.7.0
  settings_ui:
  shared_preferences:
  url_launcher:
  media_kit:

dev_dependencies:
  build_runner: ^2.3.3
  dependency_validator:
  device_info_plus:
  flutter_driver:
    sdk: flutter
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints:

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/logo.png"

flutter:
  uses-material-design: true
  generate: true
  # MSAL Android config for Microsoft sign-in (msal_auth). The plugin reads this
  # at app-creation time; client_id + redirect_uri are injected from
  # SharingAuthConfig, so they're absent here. See the backend MANUAL_SETUP.md §4.
  assets:
    - assets/msal_config.json

