name: Deploy web app to Cloudflare Pages

# The deploy itself is a reusable workflow in the dictionarylib repo
# (app-web-deploy.yaml); this is the thin SLSL-specific caller.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/lib/**'
      - 'frontend/web/**'
      - 'frontend/pubspec.yaml'
      - 'frontend/pubspec.lock'
      - '.github/workflows/web.yaml'
  workflow_dispatch:

# Single deployment at a time.
concurrency:
  group: web
  cancel-in-progress: false

jobs:
  deploy:
    uses: banool/dictionarylib/.github/workflows/app-web-deploy.yaml@main
    with:
      project_name: slsl-web
      production_branch: main
      working_directory: frontend
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
