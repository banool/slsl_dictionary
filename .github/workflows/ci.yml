name: All CI

on:
  push:
    branches: [main]
  # For smoke-testing the release jobs without a qualifying push (they are
  # path-gated on push, dispatch bypasses the filter).
  workflow_dispatch:

permissions:
  contents: write

# A newer push supersedes any in-flight run — cancel it rather than burning
# minutes finishing a build nobody will ship. Every commit has a fresh build
# number (pre-commit bump), so a cancelled upload just means a skipped number,
# which the stores are fine with.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check which files / paths have changed.
  # We use this to inform whether we should run later jobs.
  changes:
    outputs:
      admin_site: ${{ steps.filter.outputs.admin_site }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ios: ${{ steps.filter.outputs.ios }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: '.github/filters.yml'
    - name: Print changes
      run: printf "Admin site changed $ADMIN_SITE\nFrontend changed $FRONTEND\niOS changed $IOS\n"
      env:
        ADMIN_SITE: ${{ steps.filter.outputs.admin_site }}
        FRONTEND: ${{ steps.filter.outputs.frontend }}
        IOS: ${{ steps.filter.outputs.ios }}

  # Formatting gate for the Flutter app. Matches the local pre-commit hook
  # (.githooks/pre-commit) and the `dart format` style the repo is kept in.
  # The job body is a reusable workflow in the appci repo.
  format:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    uses: banool/appci/.github/workflows/app-format.yaml@main
    with:
      working_directory: frontend

  # Build the admin site image and publish to Docker Hub.
  build_push_admin_site:
    needs: [changes]
    if: needs.changes.outputs.admin_site == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin_site
    steps:
    - uses: actions/checkout@v4
    - name: Log in to Docker Hub
      uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PERSONAL_ACCESS_TOKEN }}
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
      with:
        images: banool/slsl-admin-site
        # 1. Tag the image with the branch name on push
        # 2. Tag the image with the commit hash
        tags: |
          type=ref,event=branch
          type=sha,format=long
    - name: Build and push Docker image
      uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
      with:
        context: admin_site
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # Build static and push it to the bucket
  # Build and release the Android app. These secrets originate from the
  # slsl_dictionary_secrets repo. Note, this doesn't work until you've done a single
  # manual upload on the Google Play Console UI and submitted a release to the alpha
  # track. For that, run flutter build appbundle yourself (you'll have to copy the
  # secrets in to frontend/android temporarily). See more here:
  # https://stackoverflow.com/a/69899877/3846032
  # The job body is a reusable workflow in the appci repo.
  release_android:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    uses: banool/appci/.github/workflows/app-release-android.yaml@main
    with:
      package_name: com.banool.slsl_dictionary
      working_directory: frontend
    secrets:
      UPLOAD_KEYSTORE: ${{ secrets.UPLOAD_KEYSTORE }}
      KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
      ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}

  # Build and upload an internal TestFlight build on app-change pushes, the
  # iOS counterpart of release_android. No test-only mode: a macOS runner adds
  # nothing (flutter test already runs in release_android), so this only runs
  # when it will actually upload.
  release_ios:
    needs: [changes]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.ios == 'true' && github.event_name == 'push')
    uses: banool/appci/.github/workflows/app-release-ios.yaml@main
    with:
      team_id: 9N3SNHTGL7
      working_directory: frontend
    secrets:
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

  # The web build now deploys to Cloudflare Pages (app.srilankansignlanguage.org)
  # via .github/workflows/web.yaml, replacing the old GitHub Pages deploy.
