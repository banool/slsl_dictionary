name: Deploy landing site to Cloudflare Pages

# The deploy itself is a reusable workflow in the appci repo
# (app-pages-deploy.yaml); this is the thin SLSL-specific caller.

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/pages.yaml']
  workflow_dispatch:

# A newer push supersedes any in-flight deploy — cancel it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    uses: banool/appci/.github/workflows/app-pages-deploy.yaml@main
    with:
      project_name: slsl-landing
      production_branch: main
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
