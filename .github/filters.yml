# Taken from https://github.com/banool/aclip/blob/main/.github/filters.yml
force: &force
  - ".force"

ci: &ci
  - *force
  - ".github/**/*"

admin_site:
  - *force
  - *ci
  - 'admin_site/**'

frontend:
  - *force
  - *ci
  - 'frontend/lib/**'
  - 'frontend/ios/**'
  - 'frontend/android/**'
  - 'frontend/web/**'
  - 'frontend/assets/**'
  - 'frontend/pubspec.yaml'
  - 'frontend/pubspec.lock'

# Narrower than `frontend` on purpose: don't burn a macOS build on web-only
# or asset-only changes.
ios:
  - *force
  - *ci
  - 'frontend/lib/**'
  - 'frontend/ios/**'
  - 'frontend/pubspec.yaml'
  - 'frontend/pubspec.lock'
