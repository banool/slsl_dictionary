name: All CI

on:
  push:
    branches: [main]

permissions:
  contents: write

# A newer push supersedes any in-flight run — cancel it rather than burning
# minutes finishing a build nobody will ship.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check which files / paths have changed.
  # We use this to inform whether we should run later jobs.
  changes:
    outputs:
      admin_site: ${{ steps.filter.outputs.admin_site }}
      frontend: ${{ steps.filter.outputs.frontend }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: '.github/filters.yml'
    - name: Print changes
      run: printf "Admin site changed $ADMIN_SITE\nFrontend changed $FRONTEND\n"
      env:
        ADMIN_SITE: ${{ steps.filter.outputs.admin_site }}
        FRONTEND: ${{ steps.filter.outputs.frontend }}

  # Formatting gate for the Flutter app. Matches the local pre-commit hook
  # (.githooks/pre-commit) and the `dart format` style the repo is kept in.
  # The job body is a reusable workflow in the appci repo.
  format:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    uses: banool/appci/.github/workflows/app-format.yaml@main
    with:
      working_directory: frontend

  # Build the admin site image and publish to Docker Hub.
  build_push_admin_site:
    needs: [changes]
    if: needs.changes.outputs.admin_site == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin_site
    steps:
    - uses: actions/checkout@v4
    - name: Log in to Docker Hub
      uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PERSONAL_ACCESS_TOKEN }}
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
      with:
        images: banool/slsl-admin-site
        # 1. Tag the image with the branch name on push
        # 2. Tag the image with the commit hash
        tags: |
          type=ref,event=branch
          type=sha,format=long
    - name: Build and push Docker image
      uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
      with:
        context: admin_site
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # Test-only: store uploads never happen from CI pushes — internal builds are
  # released on demand via the iOS/Android upload workflows (use the appci
  # CLI). The job body is a reusable workflow in the appci repo.
  test_android:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    uses: banool/appci/.github/workflows/app-release-android.yaml@main
    with:
      package_name: com.banool.slsl_dictionary
      working_directory: frontend
      upload: false

  # The web build now deploys to Cloudflare Pages (app.srilankansignlanguage.org)
  # via .github/workflows/web.yaml, replacing the old GitHub Pages deploy.
